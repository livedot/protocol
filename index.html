<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Protocol | Peptide & Fat Loss Tracker</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm"></script>

  <style>
    /* Base Styles & Theme */
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --accent: #a78bfa;
      --text: #f8fafc;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }
    #root { padding-bottom: 80px; }
    
    /* Layout Components */
    .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }
    .metric-bubble {
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
    }
    .tab-item { opacity: 0.5; transition: 0.3s; cursor: pointer; }
    .tab-item.active { opacity: 1; color: var(--accent); }
    
    /* Loading State */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">⚡ LOADING PROTOCOL</div>
  <div id="root"></div>

  <script>
    const html = htm.bind(React.createElement);
    const { useState, useEffect, useMemo } = React;

    // --- UTILITIES ---
    const LS = {
      get: (key, fallback) => {
        try {
          const item = localStorage.getItem(key);
          return item ? JSON.parse(item) : fallback;
        } catch (e) { return fallback; }
      },
      set: (key, val) => {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
      }
    };

    const calculateProtocolDay = (isoDate) => {
      if (!isoDate) return null;
      const start = new Date(isoDate);
      start.setHours(0,0,0,0);
      const now = new Date();
      now.setHours(0,0,0,0);
      const diff = Math.floor((now - start) / 86400000);
      return diff + 1;
    };

    // --- COMPONENTS ---
    function App() {
      const [activeTab, setActiveTab] = useState('today');
      const [startDate, setStartDate] = useState(() => LS.get('protocolStartDate', null));
      const day = useMemo(() => calculateProtocolDay(startDate), [startDate]);

      useEffect(() => {
        document.getElementById('loading').classList.add('hide');
      }, []);

      return html`
        <div className="app-container">
          <header style=${{ marginBottom: '30px' }}>
            <div className="metric-bubble">
              <div style=${{ fontSize: '24px', fontWeight: 'bold' }}>${day || '--'}</div>
              <div style=${{ fontSize: '12px', opacity: 0.6 }}>PROTOCOL DAY</div>
            </div>
          </header>

          <main>
            ${activeTab === 'today' && html`
              <div>
                <h2>Daily Protocol</h2>
                <p style=${{ opacity: 0.8 }}>Track your peptides and meals for today.</p>
                <button 
                  onClick=${() => {
                    const d = new Date().toISOString();
                    setStartDate(d);
                    LS.set('protocolStartDate', d);
                  }}
                  style=${{
                    background: 'var(--accent)',
                    border: 'none',
                    padding: '12px 20px',
                    borderRadius: '12px',
                    color: '#000',
                    fontWeight: 'bold',
                    width: '100%'
                  }}
                >
                  ${startDate ? 'Reset Protocol' : 'Start Protocol'}
                </button>
              </div>
            `}
          </main>

          <nav id="tab-bar">
            <div className=${`tab-item ${activeTab === 'today' ? 'active' : ''}`} onClick=${() => setActiveTab('today')}>
              <span>Today</span>
            </div>
            <div className=${`tab-item ${activeTab === 'stats' ? 'active' : ''}`} onClick=${() => setActiveTab('stats')}>
              <span>Stats</span>
            </div>
            <div className=${`tab-item ${activeTab === 'inventory' ? 'active' : ''}`} onClick=${() => setActiveTab('inventory')}>
              <span>Inventory</span>
            </div>
          </nav>
        </div>
      `;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(html`<${App} />`);
  </script>
</body>
</html>
